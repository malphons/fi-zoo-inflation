<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="spreadFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e3b34140"/>
      <stop offset="100%" stop-color="#e3b34108"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" rx="12"/>
  <!-- title -->
  <text x="160" y="24" fill="#e6edf3" font-size="13" font-weight="bold" text-anchor="middle" font-family="sans-serif">Fisher Equation</text>
  <!-- formula -->
  <text x="160" y="42" fill="#e3b341" font-size="10" text-anchor="middle" font-family="monospace">(1+i) = (1+r)(1+pie)</text>
  <!-- shaded spread area between curves -->
  <path d="M40,95 Q80,88 120,82 Q180,72 230,65 Q265,58 290,52 L290,110 Q265,115 230,120 Q180,128 120,135 Q80,140 40,145 Z"
        fill="url(#spreadFill)"/>
  <!-- nominal curve (upper, blue) -->
  <polyline fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="40,95 70,90 100,85 130,80 160,75 190,70 220,66 250,60 280,55 290,52"/>
  <!-- real curve (lower, green) -->
  <polyline fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    points="40,145 70,140 100,136 130,133 160,130 190,126 220,122 250,118 280,113 290,110"/>
  <!-- spread arrow at midpoint -->
  <line x1="170" y1="74" x2="170" y2="130" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="170,78 166,86 174,86" fill="#e3b341"/>
  <polygon points="170,128 166,120 174,120" fill="#e3b341"/>
  <text x="182" y="105" fill="#e3b341" font-size="9" font-family="sans-serif" font-weight="bold">pie</text>
  <!-- curve labels -->
  <text x="295" y="50" fill="#58a6ff" font-size="9" font-family="monospace">i (nominal)</text>
  <text x="295" y="114" fill="#3fb950" font-size="9" font-family="monospace">r (real)</text>
  <!-- axis labels -->
  <text x="165" y="185" fill="#8b949e" font-size="10" text-anchor="middle" font-family="sans-serif">Maturity</text>
  <text x="14" y="105" fill="#8b949e" font-size="10" text-anchor="middle" font-family="sans-serif" transform="rotate(-90,14,105)">Yield (%)</text>
</svg>
