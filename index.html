<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inflation Models — Fixed Income Model Zoo</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#0d1117;
    color:#e6edf3;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
    text-align:center;
  }
  .wrap{max-width:480px;padding:2rem}
  h1{font-size:1.6rem;margin-bottom:.5rem;color:#e3b341}
  p{color:#8b949e;margin-bottom:1.5rem;line-height:1.5}
  .spinner{
    width:36px;height:36px;margin:0 auto 1.2rem;
    border:3px solid #21262d;border-top-color:#e3b341;
    border-radius:50%;animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  a{color:#e3b341;text-decoration:none}
  a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <h1>Inflation Models</h1>
  <p>Redirecting to the Fixed Income Model Zoo&hellip;</p>
  <p><a href="../app_fi_zoo/#inflation">Click here if not redirected</a></p>
</div>
<script>
  setTimeout(function(){
    window.location.href='../app_fi_zoo/#inflation';
  },1200);
</script>
</body>
</html>
